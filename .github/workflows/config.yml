name: Build and Push Image in Docker Hub

on:
  push:
    branches: [main]

jobs:
  docker-build-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/binary-app .

      - name: Push Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/binary-app

  deploy:
    name: Deploy via Portainer Webhook
    runs-on: ubuntu-latest
    needs: docker-build-push
    steps:
      - name: Trigger Portainer Webhook
        run: |
          curl -fsSL -X POST ${{ secrets.PORTAINER_WEBHOOK }}
